<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>50 Reasons I Love You 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== BASE ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden; /* Prevent scrolling */
  background: #000;
}

body {
  font-family: 'Caveat', cursive;
  background: radial-gradient(circle at top, #1a001f, #000000 80%);
  color: #eee;
}

/* Background glow */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,155,212,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(155,100,255,0.08), transparent 40%);
  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.2;
  pointer-events: none;
}

/* ===== APP CARD ===== */
.app {
  position: relative;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20,0,30,0.85);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,105,180,0.15);
  border: 1px solid rgba(255,105,180,0.2);
}

h1 {
  color: #ff9bd4;
  text-shadow: 0 0 10px rgba(255,155,212,0.6);
  font-size: 2em;
}

p {
  font-size: 1.2em;
  margin-bottom: 20px;
  line-height: 1.4;
}

/* ===== SONGS SECTION ===== */
.songs-section {
  margin-top: 20px;
}

.songs-section h2 {
  color: #ff9bd4;
  font-size: 1em;
  text-shadow: 0 0 6px rgba(255,155,212,0.5);
  margin-bottom: 10px;
}

.songs-section iframe {
  border-radius: 15px;
  border: none;
  width: 100%;
  height: 80px;
}

/* ===== FINAL MESSAGE ===== */
#finalMessage {
  display: none;
  margin-top: 20px;
  color: #ff9bd4;
  font-size: 1.1em;
  line-height: 1.4;
}

/* ===== FLOATING EMOJIS ===== */
.float {
  position: fixed; /* fixed for viewport */
  pointer-events: none;
  z-index: 1;
  animation: floatUp 8s linear infinite, pulse 2s ease-in-out infinite;
}

/* FLOAT UP */
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
  10% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* PULSING GLOW */
@keyframes pulse {
  0%, 100% { text-shadow: 0 0 4px rgba(255,155,212,0.4); }
  50% { text-shadow: 0 0 12px rgba(255,155,212,0.8); }
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="app">
  <h1 id="day">Day 1 🖤</h1>
  <p id="reason"></p>

  <div class="songs-section">
    <h2>Songs that make me think of you 🎵</h2>
    <iframe src="https://open.spotify.com/embed/playlist/6segsD30YezPTgs4G6XpFP?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media;"></iframe>
  </div>

  <div id="finalMessage">
    🖤 You’re not just one of 50 reasons…<br>
    you’re every reason I have.<br><br>
    I love you. 🦇
  </div>
</div>

<script>
/* ===== DATA ===== */
const reasons = [
  "The way you catch me staring at you across a room and don’t look away.",
  "The little giggle you give me in the mornings when I say something dumb.",
  "How you tell me to “Shoosh” and I can’t help but laugh.",
  "The way your hand fits perfectly in mine.",
  "When you squeeze my hand and say “it’s all gonna be okay,” even when it’s not.",
  "How you’re there for me through everything, good and bad.",
  "Your fiery attitude that makes every day exciting.",
  "How your tattoos make me want to trace every line of you.",
  "The way your hair falls across your face and I just get lost in it.",
  "How you challenge me and push me to be better.",
  "That little smirk you get when you know you’re winning an argument.",
  "The way your eyes sparkle when you’re genuinely happy.",
  "How you notice the tiniest things about me and remember them.",
  "Your laugh that makes my heart do somersaults.",
  "The way you curl up next to me and make me feel safe.",
  "How you motivate me without even trying.",
  "The way you look at me when we’re both just being ourselves.",
  "How you can make any boring day feel like an adventure.",
  "That mischievous grin when you’re up to something.",
  "How you hug me like you never want to let go.",
  "How your words stay in my head all day, long after you said them.",
  "The way you tease me but also comfort me when I need it.",
  "How you never let me forget to believe in myself.",
  "How you care about the people and things that matter to you, fiercely.",
  "The way you look in your favorite clothes, like you were made for them.",
  "How you get excited about the small things in life, and I love it.",
  "The way you stare into my eyes like you’re reading my soul.",
  "Your voice - soft when you’re serious, playful when you’re joking.",
  "How you smell when I hug you and it feels like home.",
  "The little inside jokes only we understand.",
  "The way you let me be vulnerable and never judge me.",
  "How you laugh at my bad jokes and make them funny.",
  "How you hold me when I’ve had a rough day and don’t say a word.",
  "The way you bounce when you walk like you’re dancing to your own song.",
  "How you care so much it’s impossible not to care too.",
  "How you make me feel like the luckiest person alive.",
  "The way you never let life make you small - you shine.",
  "How you make even mundane things feel fun just by being there.",
  "Your fire - the way you speak your mind and don’t back down.",
  "How you kiss me like it’s the only thing that matters in the world.",
  "How you can make me blush without even trying.",
  "The way you push me to laugh at myself and not take life too seriously.",
  "How you stay grounded but still make life feel magical.",
  "How you light up a room just by walking in.",
  "How you make me feel like I’m exactly where I’m supposed to be.",
  "Your patience with me when I’m being stubborn or annoying.",
  "How you keep me motivated even when I want to give up.",
  "How your eyes soften when you’re proud of me.",
  "How your love makes me want to be the best version of myself.",
  "50. Simply, the way you are - every part of you is my favorite thing."
];

/* ===== FLOATING EMOJIS ===== */
if (!('ontouchstart' in window)) { // only desktop
  const symbols = ["🖤","🐈‍⬛","🦇"];
  setInterval(()=>{
    const el = document.createElement("div");
    el.className="float";
    el.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left = Math.random()*90 + "vw";
    el.style.fontSize = (20 + Math.random()*20) + "px"; // 20–40px
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 8000);
  }, 600);
}

/* ===== CURSOR TRAIL ===== */
if (!('ontouchstart' in window)) {
  document.addEventListener("mousemove", e=>{
    const bat = document.createElement("div");
    bat.innerText = "🖤";
    bat.style.position="fixed";
    bat.style.left=e.clientX+"px";
    bat.style.top=e.clientY+"px";
    bat.style.pointerEvents="none";
    bat.style.opacity=0.3;
    bat.style.fontSize="12px";
    bat.style.transition="0.8s";
    document.body.appendChild(bat);
    setTimeout(()=>bat.style.opacity=0,10);
    setTimeout(()=>bat.remove(),800);
  });
}

/* ===== DAY CALCULATION ===== */
function getCurrentDayGMT() {
  const startDate = new Date("2026-03-23T00:00:00Z");
  const now = new Date();
  const diff = now.getTime() - startDate.getTime();
  const days = Math.floor(diff / (1000*60*60*24));
  return Math.min(days, reasons.length-1);
}

function updateReason() {
  const day = getCurrentDayGMT();
  document.getElementById("day").innerText = "Day " + (day+1) + " 🖤";
  document.getElementById("reason").innerText = reasons[day];

  if(day === reasons.length-1){
    document.getElementById("finalMessage").style.display = "block";
  }
}

/* ===== INIT ===== */
updateReason();
setInterval(updateReason, 60000);
</script>

</body>
</html>
